<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
            }
             #dice {
                font-size: 320px;
            }
            #dice:hover {
                cursor: pointer;
                }
        </style>
    </head>
    <body>
        <div>
            Click on dice to roll it.
        </div>
        <div id="dice" onclick="stopstart()"></div>
    </body>

    <script>
        var dices = [
            "&#9856;",
            "&#9857;",
            "&#9858;",
            "&#9859;",
            "&#9860;",
            "&#9861;"
        ];
        var stopped = true
         function change() {
            var random = Math.floor(Math.random() * 6);
            dice.innerHTML = dices[random];
        }
        function stopstart() {
            if (stopped) {
                time = setInterval(change, 100);
                stopped = false;
            } 
            else {
                clearInterval(time);
                stopped = true;
            }   
        }
        window.onload = function () {
                dice = document.getElementById("dice");
                stopstart();
            }
    </script>
</html>
