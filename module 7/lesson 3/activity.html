<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h3>Add your to-do list here:</h3>
        <form id="MyForm">
            <input type="text" id="MyInput" placeholder="Enter a new task...">
            <button>Add Task</button>
        </form>
        <h2>Your To-Do list:</h2>
        <ul id="MyItems"></ul>
        
        <script>
            var MyForm = document.getElementById("MyForm");
            var MyInput = document.getElementById("MyInput");
            var MyItems = document.getElementById("MyItems");
            
            MyForm.addEventListener("submit", function(event) {
                event.preventDefault();
                createItem(MyInput.value)
                })
                
                function createItem(InputItems) {
                var Items = `<li>${InputItems} <button onclick="deleteElement(this)">Delete</button></li>`;
                MyItems.insertAdjacentHTML("beforeend", Items);
                MyInput.value = "";
                MyInput.focus();
                }
                function deleteElement(ElementToDelete) {
                ElementToDelete.parentElement.remove();
                }
        </script>
    </body>
</html>
